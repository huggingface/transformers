name: Change PR to draft

on:
  pull_request:

jobs:
  convert_pr_to_draft:
    runs-on: ubuntu-22.04
    name: Convert PR to draft
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: "2"

      - name: Convert PR to draft
        shell: bash
        env:
          Circle-Token: ${{ secrets.CIRCLECI_PAT }}
        run: |
          echo $PR_NUMBER
          python temp.py