name: CI collated reports

on:
  workflow_call:
    inputs:
      job:
        required: true
        type: string
      report_repo_id:
        required: true
        type: string
      machine_type:
        required: true
        type: string
      gpu_name:
        description: Name of the GPU used for the job. Its enough that the value contains the name of the GPU, e.g. "noise-h100-more-noise". Case insensitive.
        required: true
        type: string

jobs:
  collated_reports:
    name: Collated reports
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0

      - name: Collated reports
        shell: bash
        env:
          ACCESS_REPO_INFO_TOKEN: ${{ secrets.ACCESS_REPO_INFO_TOKEN }}
          CI_SHA: ${{ github.sha }}
          TRANSFORMERS_CI_RESULTS_UPLOAD_TOKEN: ${{ secrets.TRANSFORMERS_CI_RESULTS_UPLOAD_TOKEN }}
          MACHINE_TYPE: ${{ inputs.machine_type }}
          JOB: ${{ inputs.job }}
          REPORT_REPO_ID: ${{ inputs.report_repo_id }}
          GPU_NAME: ${{ inputs.gpu_name }}
        run: |
          pip install huggingface_hub
          python3 utils/collated_reports.py \
            --path . \
            --machine-type "$MACHINE_TYPE" \
            --commit-hash "$CI_SHA" \
            --job "$JOB" \
            --report-repo-id "$REPORT_REPO_ID" \
            --gpu-name "$GPU_NAME"
