name: Nightly Extras Smoke Test

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  get-python-versions:
    name: Get supported Python versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.extract-versions.outputs.versions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Python versions from setup.py
        id: extract-versions
        run: |
          python - <<'EOF'
          import json
          import sys
          import os
          sys.path.insert(0, '.')
          import setup

          min_ver, max_ver = setup.SUPPORTED_PYTHON_VERSIONS
          versions = [f"3.{v}" for v in range(min_ver, max_ver + 1)]

          print(f"Supported Python versions: {versions}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"versions={json.dumps(versions)}\n")
          EOF

  test-extras:
    name: Test extras on Python ${{ matrix.python-version }}
    needs: get-python-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.get-python-versions.outputs.versions) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Extract extras for this Python version
        id: get-extras
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          import setup

          # Get all extras keys for this Python version
          extras = sorted(setup.extras.keys())

          print(f"Found {len(extras)} extras for Python {sys.version_info.major}.{sys.version_info.minor}:")
          for extra in extras:
              print(f"  - {extra}")

          # Write to file for next step
          with open('extras_list.txt', 'w') as f:
              f.write('\n'.join(extras))
          EOF

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          echo "Installing base package..."
          pip install -e .

      - name: Test all extras
        run: |
          set -e
          while IFS= read -r extra; do
              echo "=== Testing extra: $extra on Python ${{ matrix.python-version }} ==="
              pip install -e .[$extra]
          done < extras_list.txt

      - name: Verify installation
        run: |
          python -c "import transformers; print(f'Transformers version: {transformers.__version__}')"
          python -c "from transformers import pipeline; print('Successfully imported pipeline')"
