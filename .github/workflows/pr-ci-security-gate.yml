name: PR CI Security Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read

jobs:
  security-check:
    # Members/collaborators/owners trigger PR CI directly — gate only needed for forks
    if: "!contains(fromJSON('[\"MEMBER\",\"OWNER\",\"COLLABORATOR\"]'), github.event.pull_request.author_association)"
    runs-on: ubuntu-22.04
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Security check
        id: check
        run: |
          # Check for workflow file changes
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep -q '^\.github/workflows/'; then
            echo "::error::PR modifies workflow files - manual review required"
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          # Check for CI infrastructure changes
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep -qE '^(scripts/|.github/|Makefile|.*\.ya?ml$)'; then
            echo "::error::PR modifies CI infrastructure - manual review required"
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "result=pass" >> "$GITHUB_OUTPUT"

  approve-pr-ci:
    needs: security-check
    if: needs.security-check.result == 'success' && needs.security-check.outputs.result == 'pass'
    runs-on: ubuntu-22.04
    steps:
      - name: Find and approve the pending PR CI workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          for i in $(seq 1 12); do
            run_id=$(gh api \
              "repos/$REPO/actions/runs?event=pull_request&head_sha=$HEAD_SHA&status=action_required" \
              --jq '.workflow_runs[] | select(.name == "PR CI") | .id' | head -1)
            if [ -n "$run_id" ]; then
              gh api --method POST "repos/$REPO/actions/runs/$run_id/approve"
              echo "Approved run $run_id"
              exit 0
            fi
            echo "Attempt $i: run not yet pending, retrying in 5s..."
            sleep 5
          done
          echo "No pending PR CI run found after retries — skipping"
