name: PR CI Security Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  security-gate:
    # Members/collaborators/owners trigger PR CI directly — gate only needed for forks
    uses: huggingface/transformers-test-ci/.github/workflows/pr-ci-security-gate.yml@reorg-flow

