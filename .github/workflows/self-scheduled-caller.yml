name: Nvidia CI

on:
  push:
    branches:
      - remove_strange_block

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ARTIFACT_MAX_ARTIFACT_COUNT: 2000
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: new_failures_with_bad_commit_run_models_gpu*
          path: ./downloaded
          merge-multiple: true
          repository: huggingface/transformers
          run-id: 25356138915
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded files
        run: |
          echo "=== Downloaded files ==="
          find ./downloaded -type f | sort || echo "No files found"
          echo "=== Total count ==="
          find ./downloaded -type f | wc -l