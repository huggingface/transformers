name: Nvidia CI

on:
  push:
    branches:
      - remove_strange_block

jobs:
  upload-test-artifacts:
    name: Upload 1030 test artifacts
    runs-on: ubuntu-22.04
    steps:
      - name: Upload 1030 separate artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { DefaultArtifactClient } = require('@actions/artifact');
            const fs = require('fs');

            const client = new DefaultArtifactClient();

            for (let i = 1; i <= 1030; i++) {
              const filename = `test_artifact_file_${i}.txt`;
              fs.writeFileSync(filename, `artifact content ${i}`);
              await client.uploadArtifact(
                `test_artifact_${String(i).padStart(4, '0')}`,
                [filename],
                '.'
              );
            }
            console.log('Done uploading 1030 artifacts');

  download-test-artifacts:
    name: Download test artifacts
    runs-on: ubuntu-22.04
    needs: upload-test-artifacts
    steps:
      - name: "Download WITHOUT token"
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: test_artifact_*
          path: ./without_token
          merge-multiple: true

      - name: Count without token
        run: |
          echo "=== Without token ==="
          find ./without_token -type f 2>/dev/null | wc -l
