name: Nvidia CI

# =============================================================================
# TEST BRANCH (run_nvidia_ci_otel_pilot) — OTEL instrumentation smoke test.
#
# Trimmed to the `model-ci` family only, and limited to a couple of model
# folders via `subdirs`, to cheaply validate that daily model-test results
# flow through the OTEL-instrumented transformers-ci reusable workflow and land
# on the pytest-observability (branch) dashboard, while still exercising the
# full Slack-report + new-failure-detection path.
#
# DO NOT MERGE THIS TRIM. The real change (repointing only the `model-ci`
# `uses:` in the full 7-family caller) is what should be PR'd.
# =============================================================================

on:
  repository_dispatch:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - run_nvidia_ci*
  workflow_dispatch:
    inputs:
      prev_workflow_run_id:
        description: 'previous workflow run id to compare'
        type: string
        required: false
        default: ""
      other_workflow_run_id:
        description: 'other workflow run id to compare'
        type: string
        required: false
        default: ""


# Used for `push` to easily modify the target workflow runs to compare against
env:
    prev_workflow_run_id: ""
    other_workflow_run_id: ""


permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-22.04
    steps:
      - name: Setup
        env:
          prev_workflow_run_id: ${{ inputs.prev_workflow_run_id || env.prev_workflow_run_id }}
          other_workflow_run_id: ${{ inputs.other_workflow_run_id || env.other_workflow_run_id }}
        run: |
          mkdir "setup_values"
          echo "$prev_workflow_run_id" > "setup_values/prev_workflow_run_id.txt"
          echo "$other_workflow_run_id" > "setup_values/other_workflow_run_id.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: setup_values
          path: setup_values

  model-ci:
    name: Model CI
    # Pilot: this family runs through the OTEL-instrumented reusable workflow in
    # transformers-ci so daily model-test results land on the pytest-observability
    # dashboards (branch view), like PR CI.
    uses: huggingface/transformers-ci/.github/workflows/daily-ci_reusable.yml@main
    with:
      job: run_models_gpu
      # TEST-ONLY: limit to a couple of model folders to keep the smoke test cheap.
      subdirs: "['bert', 'gpt2']"
      slack_report_channel: "#transformers-ci-daily-models"
      docker: huggingface/transformers-all-latest-gpu
      ci_event: Daily CI
      runner_type: "a10"
      report_repo_id: hf-internal-testing/transformers_daily_ci
      commit_sha: ${{ github.sha }}
    secrets: inherit
