  # ---------------------------------------------------------------------------
  # ===========================================================================
  # Stage 3 — Collection (equivalent of EmptyJob with job_name="collection_job")
  # Waits for all test jobs, aggregates test reports.
  # Mirrors: poll CircleCI workflow API + process_circleci_workflow_test_reports.py
  # ===========================================================================
  collection:
    name: "Collect and aggregate test results"
    runs-on: ubuntu-22.04
    # Wait for all test jobs regardless of their outcome.
    needs:
      - tests_torch
      - tests_generate
      - tests_tokenization
      - tests_processors
      - pipelines_torch
      - tests_custom_tokenizers
      - examples_torch
      - tests_exotic_models
      - tests_repo_utils
      - tests_non_model
      - tests_training_ci
      - tests_tensor_parallel_ci
      - tests_fsdp_ci
      - tests_peft_integration
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: outputs/

#      # TODO: A better way to handle (some) python scripts
#      # Discard the entire local utils/ first so that any file a contributor may
#      # have added (but that does not exist upstream) cannot survive into CI.
#      # Then repopulate exclusively from the upstream HuggingFace transformers
#      # main branch, guaranteeing only canonical tooling is executed.
#      - name: Sync utils/ from upstream HuggingFace transformers (main)
#        run: |
#          rm -rf utils/
#          git fetch https://github.com/huggingface/transformers.git main
#          git checkout FETCH_HEAD -- utils/

      - name: Aggregate test reports
        # Equivalent of process_circleci_workflow_test_reports.py
        # Script path updated: .circleci/ → utils/ (or wherever it lives in GHA)
        run: python3 utils/process_circleci_workflow_test_reports.py || true

      - name: Upload aggregated results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aggregated-test-results
          path: outputs/
          retention-days: 30

  # ===========================================================================
  # Stage 4 — Sentinel (single required check for branch protection)
  #
  # This is the ONLY job you need to add to your branch protection rules:
  #   "pr-ci / PR CI status"
  #
  # Why a separate job instead of reusing `collection`:
  #   - `collection` always succeeds (it just aggregates artefacts).
  #   - This job explicitly fails when any upstream job failed or was cancelled,
  #     and passes when all jobs either succeeded or were intentionally skipped
  #     (skipped = the test-list was empty for that job, which is expected and OK).
  #
  # Coverage:
  #   - test-preparation, check_code_quality, check_repository_consistency  (Stage 1)
  #   - all 14 conditional test jobs                                         (Stage 2)
  #   - collection                                                            (Stage 3)
  # ===========================================================================
  ci_passed:
    name: "PR CI status"
    runs-on: ubuntu-22.04
    needs:
      # Stage 1
      - test-preparation
      - check_code_quality
      - check_repository_consistency
      # Stage 2 — test jobs (may be skipped when test list is empty; that is OK)
      - tests_torch
      - tests_generate
      - tests_tokenization
      - tests_processors
      - pipelines_torch
      - tests_custom_tokenizers
      - examples_torch
      - tests_exotic_models
      - tests_repo_utils
      - tests_non_model
      - tests_training_ci
      - tests_tensor_parallel_ci
      - tests_fsdp_ci
      - tests_peft_integration
      # Stage 3
      - collection
    # Run even when upstream jobs fail so the check is always reported to GitHub.
    # Without `if: always()` this job would be skipped on upstream failure, and
    # GitHub treats a missing/skipped required check as "passing" — defeating the
    # whole purpose.
    if: always()
    steps:
      - name: Decide pass or fail
        env:
          # Pass the expression result through an env var instead of interpolating
          # it directly into the shell script, which would be a script-injection risk.
          # Acceptable values: success, skipped.
          # Unacceptable values: failure, cancelled.
          # Collects each job's result into one space-separated string, e.g. "success skipped failure success".
          NEEDS_RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Upstream job results: $NEEDS_RESULTS"

          failed=false
          # Unquoted — intentional: bash splits on spaces, iterating one result word at a time.
          for result in $NEEDS_RESULTS; do
            case "$result" in
              success|skipped)
                # Both are fine — skipped means the test list was empty for that job.
                ;;
              failure|cancelled)
                echo "  ✗ at least one job reported: $result"
                failed=true
                ;;
              *)
                echo "  ? unexpected result value: $result"
                failed=true
                ;;
            esac
          done

          if [[ "$failed" == "true" ]]; then
            echo "CI failed — see the jobs above for details."
            exit 1
          fi

          echo "All jobs passed or were intentionally skipped. CI is green."
