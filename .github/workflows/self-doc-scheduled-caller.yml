name: Doc Tests CI

on:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - new_doctest_workflow
  workflow_dispatch:

jobs:
  doc-test-ci:
    name: Doc Tests CI
    uses: ./.github/workflows/self-scheduled.yml
    with:
      job: run_models_gpu
      slack_report_channel: "#transformers-ci-docs-daily"
      docker: huggingface/transformers-all-latest-gpu
      ci_event: Daily CI
      runner_type: "a10"
      report_repo_id: hf-internal-testing/transformers_docs_ci
      commit_sha: ${{ github.sha }}
      test_path_prefix: docs/source/en/model_doc
      test_file_suffix: .md
      machine_types: '["aws-g5-4xlarge-cache"]'
    secrets: inherit
